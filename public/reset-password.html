<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Softrate Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2D3A3A;
            --accent: #A0BBB5;
            --bg: #F8FAFA;
            --text-main: #2D3A3A;
            --text-muted: #6B7280;
            --white: #FFFFFF;
            --error: #EF4444;
            --success: #10B981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #E5E7EB;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(160, 187, 181, 0.15);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #1a2323;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 1.5rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            display: block;
            background-color: #FEF2F2;
            color: var(--error);
            border: 1px solid #FEE2E2;
        }

        .message.success {
            display: block;
            background-color: #ECFDF5;
            color: var(--success);
            border: 1px solid #D1FAE5;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-dot"></div>
            SOFTRATE GLOBAL
        </div>
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below</p>

        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Reset Password</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div id="responseMessage" class="message"></div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const responseMessage = document.getElementById('responseMessage');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showMsg('Invalid or missing reset token.', 'error');
            submitBtn.disabled = true;
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                return showMsg('Passwords do not match.', 'error');
            }

            // Start Loading
            setLoading(true);
            responseMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMsg(data.message || 'Password reset successful!', 'success');
                    resetForm.reset();
                    submitBtn.disabled = true;
                } else {
                    showMsg(data.message || 'Something went wrong. Please try again.', 'error');
                }
            } catch (err) {
                showMsg('Connection error. Please check your internet.', 'error');
            } finally {
                setLoading(false);
            }
        });

        function showMsg(text, type) {
            responseMessage.textContent = text;
            responseMessage.className = `message ${type}`;
            responseMessage.style.display = 'block';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                btnText.style.display = 'none';
                loader.style.display = 'block';
                submitBtn.disabled = true;
            } else {
                btnText.style.display = 'block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
